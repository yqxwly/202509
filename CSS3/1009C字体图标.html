<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- 字体图标不是图，当成字体，可以通过CSS改变颜色，本地下载减少http请求 -->
    <!-- 阿里字体图标库 iconfont -->
    <!-- 下载代码，选择 font-class 引用 -->
    <link rel="stylesheet" href="./font/iconfont.css">

    <style>
        .iconfont {
            font-size: 40px;
            color: aquamarine;
        }
    </style>
</head>

<body>
    <!-- iconfont + 复制的名字(icon-XXX) -->
    <span class="iconfont icon-baocun_o"></span>

</body>

</html>
