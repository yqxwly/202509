<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model</title>

    <style>
        /* Box Model */
        /* 外边距margin透明的，边框border，内边距padding撑大自身，实际内容content */
        div {
            width: 100px;
            height: 100px;
            background-color: aquamarine;

            /* 单值 or 双值：上下，左右 */
            padding: 50px 10px;
            margin: 40px;
            /* 或者分开写，只用一个 */
            /* padding-left: ;
            padding-bottom: ; */

            border: 5px solid purple;
        }
    </style>
</head>

<body>
    <div>
        我是内容1
    </div>

    <div>
        我是内容2
    </div>

</body>

</html>
