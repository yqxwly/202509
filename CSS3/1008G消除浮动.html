<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- 浮动会 造成父元素高度素塌陷、后续元素也会受到影响 -->
    <!-- 清除浮动：
     1、父元素设置高度
     2、后续受影响的加 clear 属性
     3、父元素加 overflow 解决塌陷（常用）
     4、伪对象方式解决父元素塌陷 -->
    <style>
        .container {
            width: 500px;
            background-color: aqua;

            /*  */
            overflow: hidden;
        }

        /* 伪对象 */
        .container::after {
            content: "";
            display: block;
            clear: both;
        }

        .box {
            width: 100px;
            height: 100px;
            background-color: blueviolet;
            margin: 5px;

            /* 不设置父元素的高度，float后父元素高度塌陷，不会被撑开 */
            float: left;
        }

        .box1 {
            width: 100px;
            height: 100px;
            background-color: rgb(197, 153, 23);

            /* clear */
            clear: both;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>

    <!-- 后续元素也会受到影响，被遮挡 -->
    <div class="box1"></div>

</body>

</html>
