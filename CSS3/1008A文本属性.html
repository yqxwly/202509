<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        h3{
            /* 文本对齐方式 */
            text-align: center;
            /* 上滑线、下划线、删除线 */
            text-decoration: underline;
        }

        p{
             /* 大小写 */
            text-transform: capitalize;
            /* 首行文本缩进,2个字是30px */
            text-indent: 30px;
        }
    </style>
</head>

<body>
    <h3>我是一个标题</h3>
    <p>hello</p>

</body>

</html>
