<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        p {
            color: rgb(0, 0, 0);
            /* 最后一位是透明度 */
            color: rgba(22, 55, 66, 0.3);
            color: blueviolet;
            /* 16进制，设计人员一般给这个 */
            color: #000fff;

            /* 字体大小，chrome接受最小是12px */
            font-size: 30px;
            /* 粗细，加粗bold，细lighter，最常用100~900(400默认，700 bold) */
            font-weight: lighter;
            font-weight: 700;
            /* 样式，斜体italic，默认normal */
            font-style: italic;
            /* 指定宋体那些，常用微软雅黑 */
            font-family: "微软雅黑";

        }

        i{
            font-style: normal;
        }
    </style>
</head>

<body>
    <p>学习字体属性</p>
    <i>i标签</i>

</body>

</html>
