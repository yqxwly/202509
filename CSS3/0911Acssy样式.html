<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS简介</title>

    <!-- CSS由 选择器（需要改变的html元素） 和 多条声明（属性:值;）构成 -->
    <!-- 内部样式，所有该标签都生效：”单个页面易于维护，多个会混乱 -->
    <style>
        h1 {
            color: pink;
            font-size: 15px;
        }
    </style>
</head>

<body>
    <h1>今天是晴天</h1>

    <!-- 行内样式，不推荐 -->
    <p style="color: red;"></p>

</body>

</html>
