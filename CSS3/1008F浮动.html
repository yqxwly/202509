<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

         .box {
            width: 100px;
            height: 100px;
            background-color: blueviolet;

            /* 浮动，脱离 文档流/标准流，在新的一层 */
            float: left;
         }

         .bigBox{
             width: 300px;
            height: 300px;
            background-color: rgb(37, 37, 108);
         }

         img{
            width: 100px;
            /* 不加float，在标准流里面两张图片中间有空隙 */
            float: left;
         }

         ul>li{
            /* 可以变成水平摆放，之前flex是把里面的盒子水平，这里是一个整体水平 */
            /* 横向摆放总宽度不够时，会挤到下面 */
            float: left;
            margin: 100px;
         }

    </style>
</head>

<body>
    <div class="box"></div>
    <div class="bigBox"></div>

    <div>
        <img src="../HTML5/0909图片/base/1.webp" alt="">
        <img src="../HTML5/0909图片/base/1.webp" alt="">
    </div>
    
    <ul>
        <li><a href="#">1</a></li>
        <li>2</li>
        <li>3</li>
    </ul>

</body>

</html>
