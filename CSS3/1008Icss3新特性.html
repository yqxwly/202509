<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- 一些主要的特性 -->
    <style>
        div {
            width: 200px;
            height: 200px;
            background-color: blueviolet;
            margin: 0 auto;

            /* 圆角，100%变圆形 */
            /* 单值，双值：左上对角、右上对角，四值：左上顺时针 */
            border-radius: 30px;
            border-radius: 100%;
            border-radius: 50px 3px;

            /* 阴影：水平阴影位置（必），垂直阴影位置（必），模糊距离、颜色 */
            /* 阴影位置正数是向右、下 */
            box-shadow: 10px 10px 20px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body>
    <div></div>

</body>

</html>
