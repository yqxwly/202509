<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表单</title>
</head>

<body>
    <!-- 表单给用户填信息（登录，搜索框等等），以有交互功能 -->
    <!-- form属性：action后台服务器地址，name表单名称，method（get：url可看交的数据，少量数据用|post：看不到，大量） -->
    <!-- 表单是容器，  输入框、     按钮是控件 -->
    <!-- 表单标签form、表单域input、表单按钮input type="submit" -->
    <form action="">
        <input>
        <!-- <button>按钮</button> -->
        <input type="submit">
    </form>

    <form action="">
        <!-- inputL:type，文本框，密码框，提交按钮 -->
        用户名：<input type="text">
        密码：<input type="password">          <!-- 显示圆点 -->
        <input type="submit" value="登录">     
    </form>

</body>

</html>
