<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <p>p白菜</p>

    <!-- 文本标签，不同于段落，表示词汇 -->
    <!--  i（斜体），      b（加粗） -->
    <!-- em（着重文字>i），strong（加重语气>em） -->
    <!-- del（删除字），span（普通字） -->
    <i>i白菜</i>
    <em>em白菜</em>
    <b>b白菜</b>
    <strong>strong白菜</strong>
    <del>del白菜</del>
    <span>span白菜</span>

    <!-- 嵌套 -->
     <p>我喜歡吃 <em>白菜</em> </p>

</body>

</html>
