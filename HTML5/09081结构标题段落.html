<!-- 声明 html5，避免在不同浏览器打开格式不同怪异 -->
<!DOCTYPE html>

<html>


<head> <!-- head，里面是给作者看的，一般不会展现在页面 -->
    <!-- title，与搜索SEO有关 -->
    <title>网页栏的名字</title>
    <!-- meta，定义编码格式-->
    <meta charset="utf-8">
</head>

<body>
    <!-- h1-6，正确使用标题标签有益于SEO，根据重要性 -->
    <!-- align，为属性 -->
    <h1 align="left">一级标题</h1>
    <h2 align="center">二级标题</h2>
    <h3 align="right">三级标题</h3>
    <!-- h$*6  -->
    <h1>1</h1>
    <h2>2</h2>
    <h3>3</h3>
    <h4>4</h4>
    <h5>5</h5>
    <h6>6</h6>

    <!-- p，在标签内写便于调整格式 -->
    <p>是一个段落标签</p>
    <!-- br，p内换行 -->
    <p>我需要<br>换行</p>
    <!-- hr，水平线 -->
    <hr>  
    <hr color="pink" width="300px" size="10px" align="left">
    <hr color="blue" width="300px" size="10px" align="">
    <hr color="green" width="300px" size="10px" align="right">
</body>

</html>
