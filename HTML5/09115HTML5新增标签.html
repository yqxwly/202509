<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H5新增标签</title>
</head>

<body>
    <!-- div容器（id名称） -->
    <div id="header">头部</div>
    <div id="nav">导航</div>
    <div id="article">
        一个独立完整的内容块（帖子、评论等等）
        <div id="section">章节、页眉、页脚</div>
    </div>
    <div id="aside">侧边栏</div>
    <div id="footer">脚部</div>

    <!-- H5新增，SEO大于上面的 -->
    <!-- 老版本浏览器可能无法识别 -->
    <header></header>
    <nav></nav>
    <article>
        <section></section>
    </article>
    <aside></aside>
    <footer></footer>

</body>

</html>
