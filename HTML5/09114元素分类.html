<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元素</title>
</head>

<body>
    <!-- HTML5之前是 块元素和行内（内联）元素 -->
    <!-- H5分的更细，初学不友好 -->

    <!-- 块级因素，独占一行（会换行的意思）、有width和height、块里面可包含行内元素和其他块级元素 -->
    <!-- div form h1~h6 hr p table ul ……  -->
    <h1>h1标题</h1>
    <p>段落111</p>
    <ul>
        <li>一</li>
        <li>二</li>
    </ul>

    <!-- 行内（内联）元素，只占自身大小、没有width和height、里面包含内联不包含块级元素 -->
    <!-- 超链接a、词汇b strong i em span …… -->
    <a href="#">超链接yyy</a>
    <b>加粗</b>

    <!-- 行内块级元素，不换行，有w和h -->
    <!-- button img input ……-->





</body>

</html>
