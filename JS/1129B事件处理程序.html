<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- HTML事件、DOM0级事件、DOM2级事件 -->

    <!-- html -->
    <button onclick="clickHandle()">按钮</button>

    <!-- DOM0 -->
    <button id="btn">按钮</button>

    <!-- DOM2 -->
    <button id="bn">按钮</button>

    <script>
        // HTML事件，函数调用
        // 缺点：html与js没有分开，不推荐
        function clickHandle() {
            console.log("html点击了按钮");
        }


        // DOM0
        // 优点：html与js分离
        // 缺点：无法同时添加多个事件，会覆盖前面的事件
        var btn = document.getElementById("btn");
        btn.onclick = function () {
            console.log("DOM0点击了");
        }

        // DOM2
        // 优点：DOM0基础上可同时出现多个事件，不会覆盖
        // 缺点：写起来麻烦
        var bn = document.getElementById("bn");
        bn.addEventListener("click", function () {
            console.log("DOM2点击了1");
        })
        bn.addEventListener("click", function () {
            console.log("DOM2点击了2");
        })



    </script>

</body>

</html>
