<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>

        // typeof运算符，一般判断基本数据类型使用，number string boolean
        // 可以返回 object 有很多情况，对象，数组等等都行
        var age = 20;
        console.log(typeof age);  //number
        console.log(typeof []);   //object
        console.log(typeof {})    //object

        // 算数运算符
        // 一元：+ - * / %
        // 二元：自增、自减
        var num1 = 10;
        var num2 = 10;
        console.log(++num1);  //11，先+后输出
        console.log(num2++);  //10，先输出后+

        // 赋值运算符 =
        // x+=y 这样的

        // 比较运算符，返回 bool 值
        // 相等(数值)==，严格相等（数值+类型）===
        // 不等!=，严格不等!==
        var num3 = "10";
        var num4 = 10;
        console.log(num4 == num3)
        console.log(num4 === num3)

        // bool 运算符
        // ! && ||
        // 对于非bool值，会转化为bool值判断，以下取反是true：undefined null false 0 NaN 空字符串（''）
        console.log(!0);

        // 三目运算符，用于简化 if 语句
        // (条件) ? 表达式1(True执行这个) : 表达式2

    </script>

</body>

</html>
