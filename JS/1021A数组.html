<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>

        // 可以直接赋值
        // 任何类型的数据，都可以放入数组
        var arr = [100, [1, 2, 3], false];
        // 长度
        console.log(arr.length);

        // 可以先定义后赋值
        var arr1 = [];
        arr1[0] = 1;

        // 多维数组
        var a = [[1, 2], [3, 4]];
        console.log(a[0][1]);
        console.log(a[1][1]);

        // 数组遍历
        // for
        for (var i = 0; i < arr.length; i++) {
            console.log(arr[i]);
        }
        // while
        var i = 0;
        while (i < arr.length) {
            console.log(arr[i]);
            i++;
        }
        // for...in...
        for (var i in arr) {
            console.log(arr[i]);
        }

        // Array.isArray 方法返回一个布尔值，表示参数是否为数组
        // 它可以弥补typeof 运算符的不足，这个返回是object
        console.log(Array.isArray(arr));

        // push/pop 在数组末端 加/减 元素，会改变数组
        // push 可添加多个，pop 删最后一个
        // push 返回新数组的长度，pop 返回删去的元素
        console.log(arr1.push(2, 3, 5));
        console.log(arr1);
        console.log(arr1.pop());
        console.log(arr1);

        // unshift/shift 在数组头部 加/删 元素，会改变数组
        // 上面两条一样
        // shift 方法可以遍历并清空一个数组
        var list = [1, 2, 3, 4, 5, 6];
        var i;
        while (i = list.shift()) {
            console.log(i);
        }
        console.log(list);

        // join 方法以指定参数作为分隔符，将所有数组成员连接为一个 字符串 返回
        // 如果不提供参数，默认用逗号分隔
        console.log(arr1.join('|'));
        console.log(arr1.join());
        // 如果数组成员是 undefined 或 null 或空位，会被转成空字符串
        console.log([undefined, , null].join('#'));
        // 数组的 join 配合字符串的 split 可以实现数组与字符串的互换
        var arr3 = ["a", "b", "c"];
        var Myarr3 = arr3.join("");
        console.log(Myarr3);
        console.log(Myarr3.split(""));

        // concat 合并数组，原数组不变
        console.log(arr.concat(["哈基米哈基米"], [1]));
        // 除了数组作为参数， concat 也接受其他类型的值作为参数
        console.log(arr.concat("哈基米哈基米", 1));
        // 应用场景：上拉加载，合并数据

        // reverse 颠倒数组，改变原数组
        console.log(arr.reverse());
        console.log(arr);
        // 字符传反转
        var str = "hello";
        console.log(str.split("").reverse().join(""));

        // indexOf 返回给定元素在数组中第一次出现的位置，没有返回 -1
        // (查找的，开始位置)
        console.log(arr.indexOf(100));
        console.log(arr.indexOf(100,1));


    </script>

</body>

</html>
