<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>
        // 像c++

        // if
        var m = 5;
        if (m == 5) {
            m++;
        }
        console.log(m);

        // if...else...

        // switch
        var x = 1;
        switch (x) {
            case 1:
                console.log('x 等于1');
                break
            case 2:
                console.log('x 等于2');
                break
            default:
                console.log('x 等于其他值'); // 打印x等于其他值
        }

        // 三目运算符，用于简化 if 语句
        // (条件) ? 表达式1(True执行这个) : 表达式2
        var n = 100;
        var result = n % 2 === 0 ? '偶数' : '奇数';
        console.log(result);

    </script>

</body>

</html>
