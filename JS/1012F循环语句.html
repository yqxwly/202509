<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>

        //for
        // 九九乘法表
        for (var i = 1; i <= 9; i++) {
            document.write("<br>");  //像cout
            for (var j = 1; j <= i; j++) {
                sum = i * j;
                document.write(i, "*", j, "=", sum, "||");
            }
        }

        // while
        var x = 3;
        var i = 0;
        while (i < x) {
            console.log(i);
            i++;
        }

        // break语句用于跳出代码块或循环
        // continue语句用于立即 终止本轮循环，返回循环结构的头部，开始下一轮循环


    </script>

</body>

</html>
