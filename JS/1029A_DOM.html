<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <!-- DOM 是 JavaScript 操作网页的接口 -->
    <!-- 节点，层级关系 -->
    <script>
        console.log(document);

        // Node.nodeType 判断节点类型，了解，一般不这么用
        if (document.nodeType == 9) {
            console.log("顶层节点");
        }
    </script>

</body>

</html>
