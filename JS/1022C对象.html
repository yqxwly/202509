<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>
        // 像c++的类

        // 对象就是一组“键值对”（key-value）的集合
        // 是一种无序的复合数据集合
        var user = {
            name: 'itbaizhan',
            age: '13',
            getName: function (name) {
                return name;
            }
        };
        user.getName("itbaizhan");

        // 链式反应
        var user2 = {
            name: "itbaizhan",
            age: 13,
            container: {
                frontEnd: ["Web前端", "Android", "iOS"],
                backEnd: ["Java", "Python"]
            }
        };
        console.log(user2.container.frontEnd);

        // Math对象
        Math.abs(-1);
        Math.max(2, -1, 5);
        Math.min(2, -1, 5);
        // Math.floor/ceil 向 下/上取整
        Math.floor(3.2); // 3
        Math.floor(-3.2); // -4
        Math.ceil(3.2); // 4
        Math.ceil(-3.2); // -3
        // Math.random() 返回0到1之间的一个伪随机数，[0,1）
        console.log(Math.random());
        // 任何范围函数
        function getRandom(min, max) {
            return Math.random() * (max - min) + min;
        }
        console.log(getRandom(5, 10));

        // Date对象
        // 以1970年1月1日00:00:00作为时间的零点，可表示的时间范围是前后各1亿天（单位为毫秒）
        // Date.now 方法返回当前时间距离时间零点的毫秒数,时间戳
        console.log(Date.now());
        // 时间戳的对应的北京时间
        console.log(new Date(1761057211638));
        // 现在的北京时间
        console.log(new Date());
        // get*函数
        // getTime()：返回实例距离1970年1月1日00:00:00的毫秒数
        // getYear()：返回距离1900的年数
        // getDate()：返回实例对象对应每个月的几号（从1开始）
        // getDay()：返回星期几，星期日为0，星期一为1，以此类推
        // getFullYear()：返回四位的年份
        // getMonth()：返回月份（0表示1月，11表示12月）
        // getHours()：返回小时（0 - 23）
        // getMilliseconds()：返回毫秒（0 - 999）
        // getMinutes()：返回分钟（0 - 59）
        // getSeconds()：返回秒（0 - 59）
        console.log(new Date().getDay());
        // 获得本年度剩余天数
        function leftDays() {
            var today = new Date();
            // 年，月，日，时，分，秒
            var endYear = new Date(today.getFullYear(),
                11, 31, 23, 59, 59, 999);
            // 时间戳转化为天单位
            var msPerDay = 24 * 60 * 60 * 1000;
            // 转化为时间戳相减
            return Math.round((endYear.getTime() - today.getTime()) / msPerDay);
        }
        console.log(leftDays());

    </script>

</body>

</html>
