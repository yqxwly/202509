    <h3>哈哈</h3>
    <h3>哈哈</h3>

    <!-- 防抖严格算起来应该属于性能优化的知识，
     但实际上遇到的频率相当高，处理不当或者放任不管就容易引起浏览器卡死 -->
    <!-- 抢购卡死 -->

    <script>

        // 滚动监听
        // 实际上我们并不需要如此高频的反馈，毕竟浏览器的性能是有限的
        // window.onscroll = scrollHandle;
        // function scrollHandle() {
        //     console.log("页面滚动");
        // }

        function debounce(fn, delay) {
            let timer = null;
            // 闭包
            return function () {
                // timer存在，那么当前的计时取消，重新开始计时
                if (timer) {
                    clearTimeout(timer);
                }
                // timer不存在，那么就执行函数
                timer = setTimeout(fn, delay);
            }
        }

        window.onscroll = debounce(scrollHandle, 200);

        function scrollHandle() {
            var scrollTop = document.documentElement.scrollTop;
            console.log(scrollTop);
        }

    </script>

</body>
